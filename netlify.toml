[build]
  base    = "web"
  command = "npm run build"
  publish = "dist"

# Only rebuild when files inside web/ change — mobile/ and shared/ changes are ignored
[build.environment]
  NODE_VERSION = "20"

# Skip build if no web/ files changed (saves Netlify build minutes)
[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- web/"
